<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Health Guide Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
tailwind.config = {
theme: {
extend: {
colors: {
'rich-plum': '#2D1B33',
'premium-gold': '#D4AF37',
'cream-bg': '#FDFCF8',
'clay': '#795548',
},
fontFamily: {
sans: ['Instrument Sans','sans-serif'],
serif: ['Playfair Display','serif']
}
}
}
}
</script>

<style>
/* 🔥 DARK PREMIUM BACKGROUND */
body {
background:
radial-gradient(circle at 20% 20%, rgba(212,175,55,0.08), transparent 40%),
radial-gradient(circle at 80% 0%, rgba(121,85,72,0.08), transparent 40%),
linear-gradient(135deg, #1a1625 0%, #2D1B33 100%);
color:#F5F5F5;
-webkit-font-smoothing: antialiased;
}

/* cards glass effect */
.premium-card {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

/* logo */
.logo-shape {
width:100px;height:100px;
background:#2D1B33;
clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
display:flex;align-items:center;justify-content:center;
animation:float 4s ease-in-out infinite;
border:3px solid #D4AF37;
}

@keyframes float {
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

/* tags */
.target-tag {
background: rgba(255,255,255,0.08);
border:2px solid #D4AF37;
color:#D4AF37;
padding:4px 10px;
border-radius:8px;
font-size:11px;
font-weight:800;
}

/* text visibility fixes */
.text-rich-plum { color:#F5F5F5 !important; }
.text-clay { color:#d1c4e9 !important; }

.fade-up { animation: fadeUp 0.4s ease-out forwards; }
@keyframes fadeUp { from { opacity:0; transform:translateY(15px);} to {opacity:1; transform:translateY(0);} }
</style>
</head>

<body class="p-4 md:p-10">
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const App = () => {
const [step,setStep]=useState(0);
const [form,setForm]=useState({ age:'',height:'',weight:'',waist:'',neck:'',hip:'',sleep:'',s:'male',goal:'maintain' });
const [loading,setLoading]=useState(false);
const [report,setReport]=useState(null);

const steps=[
{ id:'s', q:"Are you Male or Female?", sub:"This helps us calculate your body type", options:[['male','👨‍💼 Male'],['female','👩‍💼 Female']] },
{ id:'age', q:"How old are you?", sub:"Your age affects your energy burn", type:'number', placeholder:'Years' },
{ id:'weight', q:"How much do you weigh?", sub:"Enter your weight in Kilograms", type:'number', placeholder:'Kg' },
{ id:'height', q:"How tall are you?", sub:"Enter your height in Centimeters", type:'number', placeholder:'Cm' },
{ id:'waist', q:"Measure your waist", sub:"Measure around your belly button", type:'number', placeholder:'Cm' },
{ id:'neck', q:"Measure your neck", sub:"Measure just below your throat", type:'number', placeholder:'Cm' },
...(form.s==='female'?[{ id:'hip', q:"Measure your hips", sub:"Measure the widest part", type:'number', placeholder:'Cm' }]:[]),
{ id:'sleep', q:"Nightly sleep hours?", sub:"How much do you sleep on average?", type:'number', placeholder:'Hours' },
{ id:'goal', q:"What is your main goal?", sub:"Pick what you want to achieve", options:[['loss','Lose Fat 📉'],['maintain','Stay Healthy ✨'],['gain','Build Muscle 💪']] }
];

const analyze=()=>{
setLoading(true);
setTimeout(()=>{
const {weight,height,age,s,waist,neck,hip,goal}=form;
let bmr=(10*weight)+(6.25*height)-(5*age)+(s==='male'?5:-161);
let tdee=Math.round(bmr*1.5);
if(goal==="loss") tdee-=400;
if(goal==="gain") tdee+=300;
let bmi=(weight/((height/100)**2)).toFixed(1);
let fat=s==="male"
?(86.010*Math.log10(waist-neck)-70.041*Math.log10(height)+36.76)
:(163.205*Math.log10(Number(waist)+Number(hip)-neck)-97.684*Math.log10(height)-78.387);

let targetWeight=22*((height/100)**2);
let targetBmr=Math.round((10*targetWeight)+(6.25*height)-(5*age)+(s==='male'?5:-161));

setReport({
tdee,
bmr:Math.round(bmr),
fat:Math.round(fat),
bmi,
score:Math.max(55,100-Math.abs(bmi-22)*5),
targetBmr,
targetBmi:"22.0",
targetFat:s==='male'?"15":"22",
targetTdee:Math.round(targetBmr*1.4)
});
setLoading(false);
},1200);
};

const next=()=> step<steps.length-1 ? setStep(step+1) : analyze();

const Logo=()=>(
<div className="flex flex-col items-center mb-10">
<div className="logo-shape">
<div className="flex font-black text-3xl">
<span className="text-white">H</span>
<span className="text-premium-gold mx-0.5">G</span>
<span className="text-white">P</span>
</div>
</div>
<h1 className="text-xl font-black tracking-[0.4em] uppercase mt-6">HEALTH GUIDE PRO</h1>
</div>
);

if(loading) return (
<div className="min-h-screen flex flex-col items-center justify-center">
<div className="w-14 h-14 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
<p className="mt-8 font-black italic text-lg">Finding your ideal targets...</p>
</div>
);

if(report) return (
<div className="max-w-md mx-auto fade-up pb-20">
<Logo/>

<div className="premium-card rounded-[3rem] p-10 text-center mb-10 border-t-8 border-premium-gold">
<h2 className="text-8xl font-black italic">{Math.round(report.score)}</h2>
</div>

<div className="grid gap-6 mb-10">
<div className="premium-card p-6 rounded-[2rem] border-l-8 border-premium-gold">
<h3>BMI: {report.bmi}</h3>
</div>

<div className="premium-card p-6 rounded-[2rem] border-l-8 border-premium-gold">
<h3>BMR: {report.bmr}</h3>
</div>

<div className="premium-card p-6 rounded-[2rem] border-l-8 border-premium-gold">
<h3>Calories: {report.tdee}</h3>
</div>

<div className="premium-card p-6 rounded-[2rem] border-l-8 border-premium-gold">
<h3>Body Fat: {report.fat}%</h3>
</div>
</div>

<button onClick={()=>window.open(`https://wa.me/91XXXXXXXXXX`)}
className="w-full bg-white text-black py-6 rounded-2xl font-black">
Unlock Full Plan - ₹199
</button>

</div>
);

const cur=steps[step];

return (
<div className="max-w-md mx-auto min-h-screen flex flex-col">
<Logo/>

<div className="text-center mb-6">
<h2 className="text-3xl font-black mb-2">{cur.q}</h2>
<p className="text-sm opacity-70">{cur.sub}</p>
</div>

{cur.options ? (
<div className="grid gap-4">
{cur.options.map(o=>(
<button key={o[0]}
onClick={()=>{setForm({...form,[cur.id]:o[0]});next();}}
className="p-6 rounded-2xl border">
{o[1]}
</button>
))}
</div>
):(
<div>
<input type="number"
value={form[cur.id]||""}
onChange={e=>setForm({...form,[cur.id]:e.target.value})}
className="w-full p-4 border-b-2 text-center text-3xl mb-6"
/>
<button onClick={next}
className="w-full bg-white text-black py-5 rounded-2xl">
Continue
</button>
</div>
)}

</div>
);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
