<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA ELITE | Clinical Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #030712; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-glow { background: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.15) 0%, transparent 70%); }
        .btn-premium { background: linear-gradient(90deg, #00f2ff, #0066ff); box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); }
        .card-inner { border-radius: 2rem; padding: 2rem; position: relative; overflow: hidden; }
        .card-inner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%); pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [step, setStep] = useState(0);
            const [data, setData] = useState({ w: '', h: '', a: '', s: 'm', goal: 'lean', activity: 'mod', stress: 'low' });
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const steps = [
                { id: 's', q: "Biological Baseline", sub: "Clinical sex determination for hormonal modeling", options: [['m', 'MALE (XY)'], ['f', 'FEMALE (XX)']], icon: "🧬" },
                { id: 'a', q: "Chronological Age", sub: "Metabolic decay coefficient (Mifflin Model)", icon: "⏳", type: 'number', placeholder: 'Years' },
                { id: 'w', q: "Body Mass (Kg)", sub: "Static gravitational mass analysis", icon: "⚖️", type: 'number', placeholder: 'Kg' },
                { id: 'h', q: "Stature (Cm)", sub: "Needed for BSA and Lean Mass partitioning", icon: "📏", type: 'number', placeholder: 'Cm' },
                { id: 'goal', q: "Genetic Objective", sub: "Desired physiological shift", options: [['lean', 'Lipid Oxidation 📉'], ['mass', 'Myofibrillar Growth 💪'], ['lon', 'Cellular Longevity ✨']], icon: "🎯" },
                { id: 'stress', q: "Cortisol Load", sub: "CNS stress markers analysis", options: [['low', 'Low / Managed'], ['high', 'High / Chronic']], icon: "🧠" }
            ];

            const runAnalysis = () => {
                setLoading(true);
                setTimeout(() => {
                    let bmr = (10 * data.w) + (6.25 * data.h) - (5 * data.a) + (data.s === 'm' ? 5 : -161);
                    setResult({ bmr: Math.round(bmr), tdee: Math.round(bmr * 1.55) });
                    setLoading(false);
                }, 3000);
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-10 gradient-glow">
                    <div className="w-16 h-16 rounded-full border-b-2 border-[#00f2ff] animate-spin mb-8"></div>
                    <h2 className="text-xs font-black tracking-[0.5em] text-[#00f2ff] uppercase">Cross-Referencing Research</h2>
                    <p className="text-slate-500 text-[10px] mt-4 mono italic">Applying adaptive thermogenesis algorithms...</p>
                </div>
            );

            if (result) return (
                <div className="max-w-md mx-auto p-6 animate-in fade-in slide-in-from-bottom-8 duration-1000">
                    <div className="text-center mt-8 mb-12">
                        <span className="text-[10px] font-bold text-[#00f2ff] uppercase tracking-widest border border-[#00f2ff]/30 px-3 py-1 rounded-full">Report ID: 2026-X8</span>
                        <h1 className="text-4xl font-black mt-4 italic tracking-tighter uppercase">Clinical<br/>Output</h1>
                    </div>

                    <div className="glass card-inner mb-6 text-center shadow-2xl">
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">TDEE (Metabolic Velocity)</p>
                        <h2 className="text-7xl font-black text-white tracking-tighter">{result.tdee}</h2>
                        <p className="text-xs text-slate-500 mt-2 mono uppercase tracking-widest font-bold">Kcal / 24h</p>
                    </div>

                    <div className="space-y-4">
                        <div className="glass p-6 rounded-[1.5rem] border-l-4 border-[#00f2ff]">
                            <h3 className="text-[10px] font-black text-[#00f2ff] uppercase mb-1">Pillar 1: Basal Efficiency</h3>
                            <p className="text-xs text-slate-300 leading-relaxed">Your BMR is <strong>{result.bmr} kcal</strong>. As per <em>Am. J. Clin. Nutr.</em>, this accounts for cellular maintenance at rest. Dropping intake below this triggers metabolic defense.</p>
                        </div>
                        <div className="glass p-6 rounded-[1.5rem] border-l-4 border-emerald-400">
                            <h3 className="text-[10px] font-black text-emerald-400 uppercase mb-1">Pillar 2: Thermic Variance</h3>
                            <p className="text-xs text-slate-300 leading-relaxed">Thermic Effect of Food (TEF) is estimated at <strong>{Math.round(result.tdee * 0.1)} kcal</strong>. Studies suggest protein-dense meals increase this efficiency by 20% compared to lipids.</p>
                        </div>
                        <div className="glass p-6 rounded-[1.5rem] bg-indigo-900/10 border border-indigo-500/30">
                            <h3 className="text-xs font-bold text-white mb-3">💎 ELITE PROTOCOL LOCKED</h3>
                            <p className="text-[10px] text-indigo-200 mb-6">Full nutrient partitioning and insulin sensitivity modeling required for premium users.</p>
                            <button className="w-full btn-premium py-4 rounded-xl font-black text-xs uppercase tracking-[0.2em] text-white">Unlock Full Diagnostics</button>
                        </div>
                    </div>
                </div>
            );

            const cur = steps[step];

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-6 gradient-glow">
                    <header className="py-12 flex justify-between items-center">
                        <div className="h-[2px] w-12 bg-[#00f2ff]"></div>
                        <h1 className="text-lg font-black tracking-[0.3em] italic uppercase">AURA<span className="text-[#00f2ff]">X</span></h1>
                        <div className="h-[2px] w-12 bg-slate-800"></div>
                    </header>

                    <div className="flex-1 flex flex-col justify-center">
                        <div className="mb-12">
                            <span className="mono text-[#00f2ff] text-xs font-bold uppercase tracking-widest mb-2 block">Phase 0{step + 1}</span>
                            <h2 className="text-4xl font-black tracking-tight leading-tight">{cur.q}</h2>
                            <p className="text-slate-500 text-sm mt-2">{cur.sub}</p>
                        </div>

                        <div className="glass rounded-[2.5rem] p-8 shadow-2xl">
                            {cur.options ? (
                                <div className="space-y-3">
                                    {cur.options.map(o => (
                                        <button key={o[0]} onClick={() => { setData({...data, [cur.id]: o[0]}); step < steps.length - 1 ? setStep(step + 1) : runAnalysis(); }}
                                            className="w-full p-5 rounded-2xl bg-white/5 border border-white/10 text-left font-bold text-sm uppercase tracking-widest hover:border-[#00f2ff] transition-all">
                                            {o[1]}
                                        </button>
                                    ))}
                                </div>
                            ) : (
                                <div>
                                    <input autoFocus type={cur.type} placeholder={cur.placeholder} value={data[cur.id]} onChange={e => setData({...data, [cur.id]: e.target.value})}
                                        className="w-full bg-transparent border-b-2 border-slate-800 focus:border-[#00f2ff] p-4 text-4xl font-black outline-none transition-all placeholder:text-slate-900 mb-8" />
                                    <button onClick={() => step < steps.length - 1 ? setStep(step + 1) : runAnalysis()}
                                        className="w-full bg-white text-black py-5 rounded-2xl font-black uppercase tracking-[0.3em] text-xs shadow-xl active:scale-95 transition-all">
                                        Next Signal
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
