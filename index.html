<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Guide Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'rich-plum': '#2D1B33', 'premium-gold': '#D4AF37', 'soft-purple': '#F5F2FF', 'clay': '#795548' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F5F2FF; color: #2D1B33; -webkit-font-smoothing: antialiased; font-family: 'Instrument Sans', sans-serif; overflow-x: hidden; }
        .logo-outer { width: 90px; height: 90px; background: #C7D2FE; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; }
        .logo-inner { width: 65px; height: 65px; background: #2D1B33; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 20px; }
        .logo-group { animation: float 4s ease-in-out infinite; display: flex; align-items: center; justify-content: center; gap: 10px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .target-tag { background: #F5F2FF; border: 1px solid #D4AF37; color: #D4AF37; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .fade-up { animation: fadeUp 0.5s ease-out forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [step, setStep] = useState(0);
            const [form, setForm] = useState({ age: '', height: '', weight: '', waist: '', neck: '', hip: '', steps: '', water: '', exercise: 'sedentary', s: 'male', goal: 'maintain', condition: 'none', habit: 'none' });
            const [loading, setLoading] = useState(false);
            const [report, setReport] = useState(null);
            const [error, setError] = useState(false);

            const steps = [
                { id: 's', q: "Biological Gender?", sub: "Metabolic logic factor", options: [['male', '👨‍💼 Male'], ['female', '👩‍💼 Female']] },
                { id: 'age', q: "Your Age?", sub: "Cellular repair speed", type: 'number', placeholder: 'Years' },
                { id: 'weight', q: "Current Weight?", sub: "In Kilograms", type: 'number', placeholder: 'Kg' },
                { id: 'height', q: "Your Height?", sub: "In Centimeters", type: 'number', placeholder: 'Cm' },
                { id: 'waist', q: "Waist Size?", sub: "Belly button level (Cm)", type: 'number', placeholder: 'Cm' },
                { id: 'neck', q: "Neck Size?", sub: "Below throat (Cm)", type: 'number', placeholder: 'Cm' },
                ...(form.s === 'female' ? [{ id: 'hip', q: "Hip Size?", sub: "Widest part (Cm)", type: 'number', placeholder: 'Cm' }] : []),
                { id: 'condition', q: "Medical History?", sub: "Screens for specific risks", options: [['none', 'Healthy ✨'], ['bp', 'Blood Pressure 🩸'], ['diabetes', 'Diabetes 🍬'], ['pcos', 'PCOS/PCOD 🧬']] },
                { id: 'habit', q: "Lifestyle Habits?", sub: "Frequency of toxins", options: [['none', 'Clean 🍃'], ['occasional', 'Occasional 🥂'], ['regular', 'Regular 🚬']] },
                { id: 'exercise', q: "Physical Activity?", sub: "Workouts per week", options: [['sedentary', '0-1 Days'], ['light', '2-3 Days'], ['active', '4-5 Days']] },
                { id: 'steps', q: "Daily Steps?", sub: "Current movement", type: 'number', placeholder: 'Steps' },
                { id: 'water', q: "Daily Water?", sub: "Glasses (250ml)", type: 'number', placeholder: 'Glasses' },
                { id: 'goal', q: "Your Objective?", sub: "Aligns report logic", options: [['loss', 'Lose Fat 📉'], ['maintain', 'Healthy ✨'], ['gain', 'Build Muscle 💪']] }
            ];

            const analyze = (finalData) => {
                setLoading(true);
                setTimeout(() => {
                    const W = Number(finalData.weight) || 0;
                    const H = Number(finalData.height) || 0;
                    const A = Number(finalData.age) || 0;
                    const waist = Number(finalData.waist) || 0;
                    const neck = Number(finalData.neck) || 0;
                    const hip = Number(finalData.hip) || 0;
                    const currentWater = Number(finalData.water) || 0;

                    const bmi = (W / ((H / 100) ** 2)).toFixed(1);
                    const bmr = (10 * W) + (6.25 * H) - (5 * A) + (finalData.s === 'male' ? 5 : -161);

                    let fat = 0;
                    if (finalData.s === 'male') {
                        const diff = Math.max(waist - neck, 0.1);
                        fat = 86.010 * Math.log10(diff) - 70.041 * Math.log10(H) + 36.76;
                    } else {
                        const diff = Math.max((waist + hip) - neck, 0.1);
                        fat = 163.205 * Math.log10(diff) - 97.684 * Math.log10(H) - 78.387;
                    }
                    fat = Math.min(Math.max(fat, 5), 60);

                    let targetWater = Math.max(12, Math.ceil((W * 0.04) / 0.25));
                    if (currentWater >= targetWater) targetWater = currentWater + 1;

                    const idealW = 22 * ((H / 100) ** 2);
                    const targetBmr = Math.round((10 * idealW) + (6.25 * H) - (5 * A) + (finalData.s === 'male' ? 5 : -161));
                    const targetFat = (finalData.s === 'male' ? 15 : 22);

                    let score = 100 - (Math.abs(bmi - 22) * 4) - (Math.abs(fat - targetFat) * 0.8);
                    if (finalData.condition !== 'none') score -= 14;
                    if (finalData.habit === 'regular') score -= 10;

                    setReport({
                        score: Math.max(35, Math.round(score)),
                        bmi, bmr: Math.round(bmr), fat: Math.round(fat),
                        steps: finalData.steps, water: currentWater,
                        targetWater, targetSteps: finalData.goal === 'loss' ? 12000 : 8500,
                        targetBmr, targetBmi: "22.0", targetFat
                    });
                    setLoading(false);
                }, 2000);
            };

            const handleNext = (nextValue = null) => {
                const updatedForm = nextValue ? { ...form, [steps[step].id]: nextValue } : form;
                if (!updatedForm[steps[step].id]) { setError(true); return; }
                setError(false);
                if (step < steps.length - 1) { setForm(updatedForm); setStep(step + 1); }
                else { setForm(updatedForm); analyze(updatedForm); }
            };

            const LogoGroup = () => (
                <div className="flex flex-col items-center mb-10 pt-4">
                    <div className="logo-group">
                        <div className="logo-outer"><div className="logo-inner">HGP</div></div>
                        <span className="text-4xl text-rich-plum animate-pulse opacity-80">✨</span>
                    </div>
                    <h1 className="text-sm font-black tracking-[0.4em] text-rich-plum mt-5">HEALTH GUIDE PRO</h1>
                </div>
            );

            if (loading) return <div className="min-h-screen flex flex-col items-center justify-center bg-soft-purple text-center px-10"><div className="w-12 h-12 border-4 border-rich-plum border-t-transparent rounded-full animate-spin"></div><p className="mt-4 font-black text-[10px] tracking-widest text-rich-plum">CALIBRATING BIOLOGY...</p></div>;

            if (report) {
                const cards = [
                    { 
                        t: "Metabolic Hydration", v: report.water, i: report.targetWater, u: "Gl", c: "border-premium-gold",
                        d: report.water < report.targetWater 
                            ? "Low intake is causing cellular thickening and slowing waste filtration. Increasing to the ideal will flush cortisol and boost energy." 
                            : "Elite hydration status. You are maintaining optimal plasma volume which keeps the brain sharp and the kidneys stress-free."
                    },
                    { 
                        t: "Step Density Index", v: report.steps, i: report.targetSteps, u: "", c: "border-rich-plum",
                        d: report.steps < report.targetSteps 
                            ? "Inactivity is keeping the GLUT4 protein dormant, forcing the body to store sugar as fat. Movement is required to flip the metabolic switch." 
                            : "Exceptional movement. You are actively utilizing circulating glucose and forcing your body into adipose-burning mode."
                    },
                    { 
                        t: "BMI (Physio-Ratio)", v: report.bmi, i: report.targetBmi, u: "", c: "border-premium-gold",
                        d: report.bmi > 22 
                            ? "Excess mass is creating cardiac wall pressure and systemic inflammation. Aligning to 22.0 will unlock maximum longevity." 
                            : "Your weight-to-height ratio is within the healthy zone, minimizing strain on joints and the vascular system."
                    },
                    { 
                        t: "BMR (Engine Capacity)", v: report.bmr, i: report.targetBmr, u: "Cal", c: "border-rich-plum",
                        d: report.bmr < report.targetBmr 
                            ? "Your metabolic 'engine' is undersized for your frame, leading to easy fat storage. Building muscle is key to increasing this burn rate." 
                            : "High metabolic capacity. Your system is naturally efficient at thermogenesis, favoring calorie burning over long-term storage."
                    },
                    { 
                        t: "Body Fat Level", v: report.fat + "%", i: report.targetFat + "%", u: "", c: "border-premium-gold",
                        d: report.fat > report.targetFat 
                            ? "High adipose levels are driving a cortisol-driven inflammatory cycle. Reducing this will improve focus and hormonal balance." 
                            : "Excellent lean profile. Your body is maintaining a clean hormonal environment with minimal systemic inflammation."
                    }
                ];

                return (
                    <div className="max-w-md mx-auto fade-up pb-20">
                        <LogoGroup />
                        <div className="bg-white rounded-[2rem] p-8 text-center mb-6 shadow-sm border-t-8 border-rich-plum">
                            <p className="text-[10px] font-black opacity-30 uppercase tracking-widest mb-1">Authentic Health Score</p>
                            <h2 className="text-7xl font-black text-rich-plum italic">{report.score}</h2>
                        </div>
                        <div className="grid gap-4 mb-8">
                            {cards.map((item, idx) => (
                                <div key={idx} className={`bg-white p-5 rounded-2xl border-l-8 ${item.c} shadow-sm`}>
                                    <div className="flex justify-between items-start mb-1"><h3 className="text-[10px] font-black uppercase tracking-wider">{item.t}</h3><span className="target-tag">Ideal: {item.i} {item.u}</span></div>
                                    <p className="text-3xl font-black mb-1">{item.v} {item.u}</p>
                                    <p className="text-[11px] text-clay font-bold italic leading-relaxed">{item.d}</p>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => window.open(`https://wa.me/918851096893?text=Full Awakening Plan for Score ${report.score}`)} className="w-full bg-rich-plum text-white py-6 rounded-2xl font-black uppercase tracking-widest shadow-xl text-xs">Unlock Full Plan - ₹111</button>
                    </div>
                );
            }

            const current = steps[step];
            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col fade-up">
                    <LogoGroup />
                    <div className="flex-1 px-2">
                        <div className="mb-6 text-center px-4">
                            <h2 className="text-xl font-black text-rich-plum uppercase italic leading-tight">{current.q}</h2>
                            <p className="text-clay text-[9px] font-extrabold uppercase tracking-widest opacity-60">{current.sub}</p>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] shadow-sm relative border-b-4 border-soft-purple">
                            {error && <p className="text-red-500 text-[10px] font-black text-center mb-2">Input Required</p>}
                            {current.options ? (
                                <div className="grid gap-3">{current.options.map(o => (
                                    <button key={o[0]} onClick={() => handleNext(o[0])} className="w-full p-4 text-left rounded-xl bg-soft-purple/40 border-2 border-transparent hover:border-rich-plum transition-all font-black text-lg">{o[1]}</button>
                                ))}</div>
                            ) : (
                                <div className="flex flex-col">
                                    <button onClick={() => handleNext()} className="w-full bg-rich-plum text-white py-4 rounded-xl font-black mb-4 uppercase tracking-widest text-xs shadow-lg">Next Phase →</button>
                                    <input autoFocus type={current.type} placeholder={current.placeholder} value={form[current.id]} onChange={e => setForm({...form, [current.id]: e.target.value})} className="w-full bg-transparent border-b-4 border-soft-purple text-5xl font-black outline-none text-center text-rich-plum" />
                                </div>
                            )}
                            {step > 0 && <button onClick={() => setStep(step-1)} className="mt-8 text-rich-plum opacity-40 font-black text-[10px] tracking-widest block mx-auto underline italic">← Back</button>}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
