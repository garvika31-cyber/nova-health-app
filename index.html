<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Guide Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'rich-plum': '#2D1B33',
                        'premium-gold': '#D4AF37',
                        'soft-purple': '#F3E8FF', // Light purple background
                        'lavender-border': '#D8B4FE',
                        'clay': '#795548',
                    },
                    fontFamily: { sans: ['Instrument Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F3E8FF; color: #2D1B33; -webkit-font-smoothing: antialiased; }
        .premium-card { background: #ffffff; border: 1px solid rgba(216, 180, 254, 0.4); box-shadow: 0 15px 30px rgba(45, 27, 51, 0.03); }
        
        /* TRIPLE BORDER HEXAGON LOGO */
        .logo-shape {
            width: 100px; height: 100px;
            background: #2D1B33;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            animation: float 4s ease-in-out infinite;
            position: relative;
            /* Layered borders using box-shadow for intelligence */
            box-shadow: 
                0 0 0 3px #D4AF37, /* Gold Outline */
                0 0 0 6px #ffffff, /* White Spacer */
                0 0 0 9px #D8B4FE; /* Lavender Outline */
        }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .target-tag { background: #F3E8FF; border: 1px solid #D4AF37; color: #D4AF37; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }
        .fade-up { animation: fadeUp 0.4s ease-out forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [step, setStep] = useState(0);
            const [form, setForm] = useState({ age: '', height: '', weight: '', waist: '', neck: '', hip: '', sleep: '', s: 'male', goal: 'maintain' });
            const [loading, setLoading] = useState(false);
            const [report, setReport] = useState(null);

            const steps = [
                { id: 's', q: "Are you Male or Female?", sub: "Calculates your body type", options: [['male', '👨‍💼 Male'], ['female', '👩‍💼 Female']], icon: "✨" },
                { id: 'age', q: "How old are you?", sub: "Age affects energy burn", icon: "🎂", type: 'number', placeholder: 'Years' },
                { id: 'weight', q: "Your weight?", sub: "Measured in Kilograms", icon: "⚖️", type: 'number', placeholder: 'Kg' },
                { id: 'height', q: "How tall are you?", sub: "Measured in Centimeters", icon: "📏", type: 'number', placeholder: 'Cm' },
                { id: 'waist', q: "Waist size?", sub: "Measure at belly button", icon: "📏", type: 'number', placeholder: 'Cm' },
                { id: 'neck', q: "Neck size?", sub: "Measure below throat", icon: "🦒", type: 'number', placeholder: 'Cm' },
                ...(form.s === 'female' ? [{ id: 'hip', q: "Hip size?", sub: "Widest part of hips", icon: "📐", type: 'number', placeholder: 'Cm' }] : []),
                { id: 'sleep', q: "Daily sleep?", sub: "Average hours per night", icon: "🌙", type: 'number', placeholder: 'Hours' },
                { id: 'goal', q: "Your main goal?", sub: "Pick your objective", options: [['loss', 'Lose Fat 📉'], ['maintain', 'Stay Healthy ✨'], ['gain', 'Build Muscle 💪']], icon: "🎯" }
            ];

            const analyze = () => {
                setLoading(true);
                setTimeout(() => {
                    const { weight, height, age, s, waist, neck, hip, sleep, goal } = form;
                    let bmr = (10*weight) + (6.25*height) - (5*age) + (s === 'male' ? 5 : -161);
                    let tdee = Math.round(bmr * 1.5);
                    if(goal === "loss") tdee -= 400;
                    if(goal === "gain") tdee += 300;
                    let bmi = (weight / ((height/100)**2)).toFixed(1);
                    let fat = s === "male" 
                        ? (86.010 * Math.log10(waist - neck) - 70.041 * Math.log10(height) + 36.76)
                        : (163.205 * Math.log10(Number(waist) + Number(hip) - neck) - 97.684 * Math.log10(height) - 78.387);
                    
                    let targetWeight = 22.0 * ((height/100)**2);
                    let targetBmr = Math.round((10*targetWeight) + (6.25*height) - (5*age) + (s === 'male' ? 5 : -161));
                    setReport({ tdee, bmr: Math.round(bmr), fat: Math.round(fat), bmi, score: Math.max(55, 100 - (Math.abs(bmi-22)*5)), targetBmr, targetBmi: "22.0", targetFat: (s === 'male' ? "15" : "22"), targetTdee: Math.round(targetBmr * 1.4) });
                    setLoading(false);
                }, 2800);
            };

            const next = () => step < steps.length - 1 ? setStep(step + 1) : analyze();

            const Logo = () => (
                <div className="flex flex-col items-center mb-12">
                    <div className="logo-shape">
                        <div className="flex z-10 font-black text-2xl">
                            <span className="text-white">H</span>
                            <span className="text-premium-gold mx-0.5">G</span>
                            <span className="text-white">P</span>
                        </div>
                    </div>
                    <h1 className="text-xl font-black tracking-[0.5em] uppercase text-rich-plum mt-8">HEALTH GUIDE PRO</h1>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-soft-purple text-center">
                    <div className="w-12 h-12 border-4 border-rich-plum border-t-transparent rounded-full animate-spin"></div>
                    <p className="mt-6 font-black uppercase tracking-widest text-rich-plum">Calculating...</p>
                </div>
            );

            if (report) return (
                <div className="max-w-md mx-auto fade-up pb-20">
                    <Logo />
                    <div className="premium-card rounded-[3rem] p-8 text-center mb-8 border-t-8 border-rich-plum">
                        <p className="text-xs font-black opacity-30 uppercase tracking-[0.2em] mb-1">Health Score</p>
                        <h2 className="text-7xl font-black text-rich-plum italic">{Math.round(report.score)}</h2>
                    </div>

                    <div className="grid gap-4 mb-8">
                        {[
                            { title: "Body Balance (BMI)", val: report.bmi, ideal: report.targetBmi, desc: "Reaching ideal makes you feel light.", border: "border-rich-plum" },
                            { title: "Daily Burn (BMR)", val: report.bmr, ideal: report.targetBmr, desc: "Your natural energy speed.", border: "border-premium-gold" },
                            { title: "Fuel Limit", val: report.tdee, ideal: report.targetTdee, desc: "Daily food budget for goals.", border: "border-rich-plum" },
                            { title: "Fat Level", val: report.fat + "%", ideal: report.targetFat + "%", desc: "Lowering this boosts energy.", border: "border-premium-gold" }
                        ].map((item, i) => (
                            <div key={i} className={`premium-card p-5 rounded-2xl border-l-8 ${item.border}`}>
                                <div className="flex justify-between items-start mb-1">
                                    <h3 className="text-rich-plum text-[10px] font-black uppercase">{item.title}</h3>
                                    <span className="target-tag">Ideal: {item.ideal}</span>
                                </div>
                                <p className="text-3xl font-black mb-1">{item.val}</p>
                                <p className="text-xs text-clay font-bold italic">{item.desc}</p>
                            </div>
                        ))}
                    </div>

                    <div className="bg-rich-plum text-white p-8 rounded-[2.5rem] shadow-2xl">
                        <h3 className="text-xl font-black mb-4 uppercase text-premium-gold italic">The Awakening</h3>
                        <ul className="space-y-3 mb-8 text-xs font-bold opacity-90">
                            <li>✔️ Fix metabolic blockages</li>
                            <li>✔️ Sync hormones with sleep</li>
                            <li>✔️ Stop feeling sluggish</li>
                        </ul>
                        <button onClick={() => window.open(`https://wa.me/91XXXXXXXXXX?text=Full Guide. Score: ${Math.round(report.score)}`)} 
                            className="w-full bg-white text-rich-plum py-5 rounded-xl font-black uppercase tracking-widest shadow-xl">
                            Unlock Plan - ₹199
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col fade-up">
                    <Logo />
                    <div className="flex-1 flex flex-col justify-center">
                        <div className="mb-8 text-center px-4">
                            <h2 className="text-2xl font-black text-rich-plum uppercase italic leading-tight mb-2">{steps[step].q}</h2>
                            <p className="text-clay text-[11px] font-extrabold uppercase tracking-widest opacity-60">{steps[step].sub}</p>
                        </div>

                        <div className="premium-card p-8 rounded-[2.5rem] relative">
                            <div className="absolute top-0 left-0 w-full h-1 bg-soft-purple rounded-t-full">
                                <div className="h-full bg-rich-plum transition-all duration-700" style={{ width: `${((step+1)/steps.length)*100}%` }}></div>
                            </div>
                            
                            {steps[step].options ? (
                                <div className="grid gap-3 mt-4">
                                    {steps[step].options.map(o => (
                                        <button key={o[0]} onClick={() => { setForm({...form, [steps[step].id]: o[0]}); next(); }}
                                            className="w-full p-5 text-left rounded-xl bg-soft-purple/50 border-2 border-transparent hover:border-rich-plum transition-all font-black text-xl">
                                            {o[1]}
                                        </button>
                                    ))}
                                </div>
                            ) : (
                                <div className="mt-4 text-center">
                                    <input autoFocus type={steps[step].type} placeholder={steps[step].placeholder} value={form[steps[step].id]} onChange={e => setForm({...form, [steps[step].id]: e.target.value})}
                                        className="w-full bg-transparent border-b-4 border-soft-purple focus:border-rich-plum p-2 text-5xl font-black outline-none transition-all mb-8 text-center text-rich-plum" />
                                    <button onClick={next} className="w-full bg-rich-plum text-white py-5 rounded-xl font-black uppercase tracking-widest shadow-xl">
                                        Next
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
