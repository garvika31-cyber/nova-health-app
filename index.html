<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaHealth 🔬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0f172a]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const scienceEngine = {
          calculate: (data) => {
            const { weight, height, age, sex, goal, medical } = data;
            let bmr = (10 * weight) + (6.25 * height) - (5 * age);
            bmr = (sex === 'male') ? bmr + 5 : bmr - 161;
            const tdee = bmr * 1.55;
            let target = (goal === 'lose') ? tdee - 500 : (goal === 'gain') ? tdee + 500 : tdee;
            return {
              bmr: Math.round(bmr),
              tdee: Math.round(tdee),
              target: Math.round(target),
              protein: Math.round(weight * (goal === 'gain' ? 2.2 : 1.8)),
              carbs: Math.round((target * 0.45) / 4),
              fats: Math.round((target * 0.25) / 9),
              safety: medical.toLowerCase().includes('knee') ? "Focus on low-impact (Zone 2 cardio)." : "Optimize for high-intensity training."
            };
          }
        };

        function App() {
            const [inputs, setInputs] = useState({ weight: 70, height: 170, age: 25, sex: 'male', goal: 'maintain', medical: '' });
            const [report, setReport] = useState(null);
            const [premium, setPremium] = useState(false);

            return (
                <div className="min-h-screen text-white p-6 font-sans flex justify-center">
                    <div className="w-full max-w-md">
                        <div className="text-center mb-8">
                            <h1 className="text-4xl font-black tracking-tighter text-green-400 italic">NOVAHEALTH 🔬</h1>
                            <p className="text-slate-400 text-xs mt-1 uppercase tracking-widest">Scientific Protocol v1.0</p>
                        </div>

                        {!report ? (
                            <div className="bg-slate-800/50 backdrop-blur-md p-8 rounded-[2.5rem] border border-slate-700 shadow-2xl space-y-4">
                                <input type="number" placeholder="Weight (kg)" className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none focus:border-green-400" onChange={e => setInputs({...inputs, weight: Number(e.target.value)})} />
                                <input type="number" placeholder="Height (cm)" className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-700 outline-none focus:border-green-400" onChange={e => setInputs({...inputs, height: Number(e.target.value)})} />
                                <select className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-700 text-slate-300" onChange={e => setInputs({...inputs, goal: e.target.value})}>
                                    <option value="maintain">Goal: Longevity & Tone</option>
                                    <option value="lose">Goal: Fat Loss</option>
                                    <option value="gain">Goal: Muscle Build</option>
                                </select>
                                <button onClick={() => setReport(scienceEngine.calculate(inputs))} className="w-full bg-green-400 text-black py-5 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">ANALYZE BIOMETRICS</button>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-br from-green-500 to-emerald-700 p-8 rounded-[2.5rem] text-center shadow-xl">
                                    <p className="text-xs font-bold opacity-80 uppercase mb-1">Target Daily Energy</p>
                                    <h2 className="text-6xl font-black tracking-tighter">{report.target}</h2>
                                    <p className="text-xs font-medium bg-black/20 inline-block px-3 py-1 rounded-full mt-2">Calories / Day</p>
                                </div>
                                
                                {!premium ? (
                                    <button onClick={() => setPremium(true)} className="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-lg">Unlock Scientific Macro-Split 💎</button>
                                ) : (
                                    <div className="bg-slate-800 p-6 rounded-[2rem] border border-blue-500/30 space-y-3">
                                        <div className="flex justify-between text-sm border-b border-white/5 pb-2"><span>Protein</span><span className="font-bold">{report.protein}g</span></div>
                                        <div className="flex justify-between text-sm border-b border-white/5 pb-2"><span>Carbs</span><span className="font-bold">{report.carbs}g</span></div>
                                        <p className="text-[10px] text-yellow-500 font-bold mt-2 uppercase">Safety Note: {report.safety}</p>
                                    </div>
                                )}
                                <button onClick={() => setReport(null)} className="w-full text-xs text-slate-500 underline uppercase tracking-widest">Restart Engine</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
