<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Guide Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { background:#FDFCF8; color:#2D1B33; }
.premium-card { background:#fff; border:1px solid rgba(45,27,51,0.08); box-shadow:0 20px 40px rgba(45,27,51,0.05); }
.logo-shape {
width:100px;height:100px;background:#2D1B33;
clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
display:flex;align-items:center;justify-content:center;
border:3px solid #D4AF37;
}
.target-tag {background:#FDFCF8;border:2px solid #D4AF37;color:#D4AF37;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState } = React;

function App(){

const [step,setStep]=useState(0);
const [form,setForm]=useState({
age:'',height:'',weight:'',waist:'',neck:'',hip:'',sleep:'',
s:'male',goal:'maintain'
});
const [loading,setLoading]=useState(false);
const [report,setReport]=useState(null);
const [error,setError]=useState("");

const steps=[
{ id:'s', q:"Are you Male or Female?", options:[['male','👨 Male'],['female','👩 Female']]},
{ id:'age', q:"Age?", type:'number'},
{ id:'weight', q:"Weight (kg)?", type:'number'},
{ id:'height', q:"Height (cm)?", type:'number'},
{ id:'waist', q:"Waist (cm)?", type:'number'},
{ id:'neck', q:"Neck (cm)?", type:'number'},
...(form.s==='female'?[{id:'hip',q:"Hip (cm)?",type:'number'}]:[]),
{ id:'sleep', q:"Sleep hours?", type:'number'},
{ id:'goal', q:"Goal?", options:[['loss','Lose Fat'],['maintain','Maintain'],['gain','Gain Muscle']]}
];

const isValid=()=>{
const req=['age','height','weight','waist','neck','sleep'];
for(let k of req){
if(!form[k]||Number(form[k])<=0)return false;
}
if(form.s==='female'&&(!form.hip||form.hip<=0))return false;
return true;
};

const analyze=()=>{
const age=Number(form.age);
const weight=Number(form.weight);
const height=Number(form.height);
const waist=Number(form.waist);
const neck=Number(form.neck);
const hip=Number(form.hip||0);

if(waist<=neck){
alert("Waist must be larger than neck");
return;
}

setLoading(true);

setTimeout(()=>{
let bmr=(10*weight)+(6.25*height)-(5*age)+(form.s==='male'?5:-161);
let tdee=Math.round(bmr*1.5);

if(form.goal==="loss")tdee-=400;
if(form.goal==="gain")tdee+=300;

let bmi=(weight/((height/100)**2)).toFixed(1);

let fat=form.s==="male"
?(86.010*Math.log10(waist-neck)-70.041*Math.log10(height)+36.76)
:(163.205*Math.log10(waist+hip-neck)-97.684*Math.log10(height)-78.387);

setReport({
bmr:Math.round(bmr),
tdee,
bmi,
fat:Math.round(fat),
score:Math.max(55,100-Math.abs(bmi-22)*5)
});

setLoading(false);

},1200);
};

const next=()=>{
setError("");
if(step===steps.length-1){
if(!isValid()){
setError("Fill all fields");
return;
}
analyze();
}else{
setStep(step+1);
}
};

const Logo=()=>(
<div style={{textAlign:'center',marginBottom:'20px'}}>
<div className="logo-shape">
<span style={{color:'white',fontWeight:'900'}}>HGP</span>
</div>
<h2>HEALTH GUIDE PRO</h2>
</div>
);

if(loading){
return <div style={{textAlign:'center',marginTop:'100px'}}>Loading...</div>;
}

if(report){
return(
<div style={{maxWidth:'400px',margin:'auto',textAlign:'center'}}>
<Logo/>
<h1>{report.score}</h1>
<p>BMI: {report.bmi}</p>
<p>BMR: {report.bmr}</p>
<p>Calories: {report.tdee}</p>
<p>Fat: {report.fat}%</p>

<button onClick={()=>{
const phone="919876543210";
window.open(`https://wa.me/${phone}?text=My score is ${report.score}`);
}}>
Buy Plan ₹199
</button>
</div>
);
}

const cur=steps[step];

return(
<div style={{maxWidth:'400px',margin:'auto'}}>

<Logo/>

{step>0 && <button onClick={()=>setStep(step-1)}>Back</button>}

<h3>{cur.q}</h3>

{cur.options?(
cur.options.map(o=>(
<button key={o[0]} onClick={()=>{setForm({...form,[cur.id]:o[0]});next();}}>
{o[1]}
</button>
))
):(
<div>
<input
type="number"
value={form[cur.id]||""}
onChange={e=>setForm({...form,[cur.id]:e.target.value})}
/>

{error && <p>{error}</p>}

<button onClick={next}>Continue</button>
</div>
)}

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
