<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Guide Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'hgp-purple': '#5e35b1',
                        'hgp-brown': '#795548',
                        'hgp-grey': '#f0f0f2',
                        'hgp-dark': '#1c1c1e',
                    },
                    fontFamily: { sans: ['Instrument Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f0f0f2; color: #1c1c1e; -webkit-font-smoothing: antialiased; }
        .glass-card { background: #ffffff; border: 2px solid rgba(0,0,0,0.05); }
        .logo-gradient { background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%); }
        /* Ensuring all inputs and buttons feel consistent and large */
        input, button, select { font-weight: 800 !important; font-size: 1.25rem !important; }
        .step-transition { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [step, setStep] = useState(0);
            const [form, setForm] = useState({ age: '', height: '', weight: '', waist: '', neck: '', hip: '', sleep: '', s: 'male', goal: 'maintain' });
            const [loading, setLoading] = useState(false);
            const [report, setReport] = useState(null);

            const steps = [
                { id: 's', q: "Select Your Gender", sub: "Biological baseline check", options: [['male', '👨‍💼 Male'], ['female', '👩‍💼 Female']], icon: "🌱" },
                { id: 'age', q: "What is your Age?", sub: "Years since birth", icon: "🎂", type: 'number', placeholder: 'Years' },
                { id: 'weight', q: "Your Current Weight?", sub: "Measured in Kilograms", icon: "⚖️", type: 'number', placeholder: 'Kg' },
                { id: 'height', q: "Your Total Height?", sub: "Measured in Centimeters", icon: "📏", type: 'number', placeholder: 'Cm' },
                { id: 'waist', q: "Your Waist Size?", sub: "Measure at the navel", icon: "📏", type: 'number', placeholder: 'Cm' },
                { id: 'neck', q: "Your Neck Size?", sub: "Measure below the throat", icon: "🦒", type: 'number', placeholder: 'Cm' },
                ...(form.s === 'female' ? [{ id: 'hip', q: "Your Hip Size?", sub: "Widest part of hips", icon: "📐", type: 'number', placeholder: 'Cm' }] : []),
                { id: 'sleep', q: "Daily Sleep Hours?", sub: "Average nightly recovery", icon: "🌙", type: 'number', placeholder: 'Hours' },
                { id: 'goal', q: "Your Main Health Goal?", sub: "Your primary focus", options: [['loss', 'Lose Fat 📉'], ['maintain', 'Stay Healthy ✨'], ['gain', 'Build Muscle 💪']], icon: "🎯" }
            ];

            const analyze = () => {
                setLoading(true);
                setTimeout(() => {
                    const { weight, height, age, s, waist, neck, hip, sleep, goal } = form;
                    let bmr = (10*weight) + (6.25*height) - (5*age) + (s === 'male' ? 5 : -161);
                    let tdee = Math.round(bmr * 1.5);
                    if(goal === "loss") tdee -= 400;
                    if(goal === "gain") tdee += 300;
                    let bmi = (weight / ((height/100)**2)).toFixed(1);
                    let fat = s === "male" 
                        ? (86.010 * Math.log10(waist - neck) - 70.041 * Math.log10(height) + 36.76)
                        : (163.205 * Math.log10(Number(waist) + Number(hip) - neck) - 97.684 * Math.log10(height) - 78.387);
                    
                    setReport({ tdee, bmr: Math.round(bmr), fat: fat.toFixed(1), bmi, score: Math.max(60, 100 - (Math.abs(bmi-23)*4)) });
                    setLoading(false);
                }, 2500);
            };

            const next = () => step < steps.length - 1 ? setStep(step + 1) : analyze();

            const Header = () => (
                <div className="flex justify-center mb-8 mt-2">
                    <div className="flex items-center gap-3 logo-gradient p-4 px-8 rounded-3xl shadow-md border-b-4 border-black/20">
                        <span className="text-3xl">🛡️</span>
                        <h1 className="text-2xl font-extrabold text-white tracking-tighter uppercase italic">Health Guide Pro</h1>
                    </div>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-10 bg-hgp-grey">
                    <div className="w-16 h-16 border-8 border-hgp-purple border-t-transparent rounded-full animate-spin"></div>
                    <p className="mt-8 text-xl font-extrabold text-hgp-purple uppercase italic">Calculating Insights...</p>
                </div>
            );

            if (report) return (
                <div className="max-w-md mx-auto step-transition pb-20">
                    <Header />
                    <div className="bg-white rounded-[2.5rem] p-10 text-center mb-6 shadow-xl border-2 border-hgp-purple/10">
                        <p className="text-sm font-extrabold text-slate-400 uppercase tracking-widest mb-2">Wellness Score</p>
                        <h2 className="text-8xl font-black text-hgp-purple italic">{Math.round(report.score)}</h2>
                    </div>

                    <div className="space-y-4 mb-8">
                        <div className="bg-white p-6 rounded-3xl shadow-md border-l-8 border-hgp-purple">
                            <h3 className="text-hgp-purple text-sm font-black uppercase mb-1 italic">01. Calorie Target</h3>
                            <p className="text-3xl font-black">{report.tdee} Kcal</p>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-md border-l-8 border-hgp-brown">
                            <h3 className="text-hgp-brown text-sm font-black uppercase mb-1 italic">02. Body Fat Ratio</h3>
                            <p className="text-3xl font-black">{report.fat}%</p>
                        </div>
                    </div>

                    {/* AWAKENING INSIGHT PREVIEW */}
                    <div className="bg-hgp-dark text-white p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-10 text-4xl">💎</div>
                        <h3 className="text-2xl font-black mb-4 uppercase italic tracking-tighter text-hgp-purple">Awakening Insights</h3>
                        <div className="space-y-4 mb-8">
                            <p className="text-sm font-bold border-l-2 border-white/20 pl-4">🔓 Hidden Metabolic Blockage Detected</p>
                            <p className="text-sm font-bold border-l-2 border-white/20 pl-4">🔓 Optimal Eating Window: Found</p>
                            <p className="text-sm font-bold border-l-2 border-white/20 pl-4">🔓 Personalized Hormone Reset Plan</p>
                        </div>
                        <button onClick={() => window.open(`https://wa.me/91XXXXXXXXXX?text=I want my awakening insights. My score is ${Math.round(report.score)}`)} 
                            className="w-full bg-hgp-purple hover:bg-white hover:text-hgp-purple text-white py-6 rounded-2xl font-black uppercase tracking-widest text-lg transition-all shadow-lg shadow-purple-500/20">
                            Get My Full Plan - ₹199
                        </button>
                    </div>
                </div>
            );

            const cur = steps[step];

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col step-transition">
                    <Header />
                    <div className="flex-1 flex flex-col justify-center">
                        <div className="flex items-center gap-4 mb-8 bg-white p-6 rounded-[2rem] shadow-lg border-2 border-hgp-purple/10">
                            <div className="text-5xl">{cur.icon}</div>
                            <div>
                                <h2 className="text-2xl font-black tracking-tight text-hgp-dark uppercase italic leading-tight">{cur.q}</h2>
                                <p className="text-slate-400 text-sm font-bold uppercase">{cur.sub}</p>
                            </div>
                        </div>

                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl border-b-8 border-black/5 relative">
                            {cur.options ? (
                                <div className="grid gap-4 mt-2">
                                    {cur.options.map(o => (
                                        <button key={o[0]} onClick={() => { setForm({...form, [cur.id]: o[0]}); next(); }}
                                            className="w-full p-6 text-left rounded-[1.5rem] border-2 border-hgp-grey bg-hgp-grey hover:border-hgp-purple hover:bg-hgp-purple/5 transition-all font-black text-xl flex items-center gap-4">
                                            {o[1]}
                                        </button>
                                    ))}
                                </div>
                            ) : (
                                <div className="mt-2 text-center">
                                    <input autoFocus type={cur.type} placeholder={cur.placeholder} value={form[cur.id]} onChange={e => setForm({...form, [cur.id]: e.target.value})}
                                        className="w-full bg-transparent border-b-4 border-hgp-grey focus:border-hgp-purple p-4 text-6xl font-black outline-none transition-all placeholder:text-slate-200 mb-10 text-center text-hgp-purple" />
                                    <button onClick={next} className="w-full bg-hgp-purple text-white py-6 rounded-[1.5rem] font-black uppercase tracking-[0.2em] text-xl shadow-xl active:scale-95 transition-all">
                                        Continue →
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
