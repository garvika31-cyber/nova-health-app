<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Guide Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700;800&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'rich-plum': '#2D1B33', // Deep Luxury Purple
                        'gold-tint': '#D4AF37', // Muted Gold
                        'cream-bg': '#FDFCF8',  // Luxury Paper White
                        'clay': '#795548',      // Warm Brown
                    },
                    fontFamily: { 
                        sans: ['Instrument Sans', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FDFCF8; color: #2D1B33; -webkit-font-smoothing: antialiased; }
        .premium-card { background: #ffffff; border: 1px solid rgba(45, 27, 51, 0.08); box-shadow: 0 20px 40px rgba(45, 27, 51, 0.05); }
        .logo-box { background: #2D1B33; border-radius: 18px; transform: rotate(-2deg); }
        .logo-text { font-family: 'Playfair Display', serif; font-style: italic; }
        input, button { font-weight: 800 !important; font-size: 1.25rem !important; }
        .fade-up { animation: fadeUp 0.5s ease-out forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [step, setStep] = useState(0);
            const [form, setForm] = useState({ age: '', height: '', weight: '', waist: '', neck: '', hip: '', sleep: '', s: 'male', goal: 'maintain' });
            const [loading, setLoading] = useState(false);
            const [report, setReport] = useState(null);

            const steps = [
                { id: 's', q: "Select Your Gender", sub: "Biological baseline check", options: [['male', '👨‍💼 Male'], ['female', '👩‍💼 Female']], icon: "✨" },
                { id: 'age', q: "What is your Age?", sub: "Years since birth", icon: "🎂", type: 'number', placeholder: 'Years' },
                { id: 'weight', q: "Your Current Weight?", sub: "Measured in Kilograms", icon: "⚖️", type: 'number', placeholder: 'Kg' },
                { id: 'height', q: "Your Total Height?", sub: "Measured in Centimeters", icon: "📏", type: 'number', placeholder: 'Cm' },
                { id: 'waist', q: "Your Waist Size?", sub: "Measure at the navel", icon: "📏", type: 'number', placeholder: 'Cm' },
                { id: 'neck', q: "Your Neck Size?", sub: "Measure below the throat", icon: "🦒", type: 'number', placeholder: 'Cm' },
                ...(form.s === 'female' ? [{ id: 'hip', q: "Your Hip Size?", sub: "Widest part of hips", icon: "📐", type: 'number', placeholder: 'Cm' }] : []),
                { id: 'sleep', q: "Daily Sleep Hours?", sub: "Average nightly recovery", icon: "🌙", type: 'number', placeholder: 'Hours' },
                { id: 'goal', q: "Your Main Health Goal?", sub: "Your primary focus", options: [['loss', 'Lose Fat 📉'], ['maintain', 'Stay Healthy ✨'], ['gain', 'Build Muscle 💪']], icon: "🎯" }
            ];

            const analyze = () => {
                setLoading(true);
                setTimeout(() => {
                    const { weight, height, age, s, waist, neck, hip, sleep, goal } = form;
                    let bmr = (10*weight) + (6.25*height) - (5*age) + (s === 'male' ? 5 : -161);
                    let tdee = Math.round(bmr * 1.5);
                    if(goal === "loss") tdee -= 400;
                    if(goal === "gain") tdee += 300;
                    let bmi = (weight / ((height/100)**2)).toFixed(1);
                    let fat = s === "male" 
                        ? (86.010 * Math.log10(waist - neck) - 70.041 * Math.log10(height) + 36.76)
                        : (163.205 * Math.log10(Number(waist) + Number(hip) - neck) - 97.684 * Math.log10(height) - 78.387);
                    
                    setReport({ tdee, bmr: Math.round(bmr), fat: Math.round(fat), bmi, score: Math.max(60, 100 - (Math.abs(bmi-23)*4)) });
                    setLoading(false);
                }, 2500);
            };

            const next = () => step < steps.length - 1 ? setStep(step + 1) : analyze();

            const Logo = () => (
                <div className="flex flex-col items-center mb-10">
                    <div className="logo-box p-3 px-6 shadow-xl mb-2">
                        <h1 className="logo-text text-white text-3xl">HGP</h1>
                    </div>
                    <p className="text-[10px] font-extrabold tracking-[0.4em] uppercase text-rich-plum opacity-40">Health Guide Pro</p>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-cream-bg">
                    <div className="w-12 h-12 border-4 border-rich-plum border-t-transparent rounded-full animate-spin"></div>
                    <p className="mt-6 font-extrabold uppercase tracking-widest text-rich-plum">Compiling Data...</p>
                </div>
            );

            if (report) return (
                <div className="max-w-md mx-auto fade-up pb-20">
                    <Logo />
                    <div className="premium-card rounded-[3rem] p-10 text-center mb-8 border-t-4 border-rich-plum">
                        <p className="text-xs font-extrabold opacity-40 uppercase tracking-widest mb-2">Your Wellness Score</p>
                        <h2 className="text-8xl font-black text-rich-plum italic">{Math.round(report.score)}</h2>
                    </div>

                    <div className="grid gap-4 mb-8">
                        {/* 1. CALORIES */}
                        <div className="premium-card p-6 rounded-3xl">
                            <h3 className="text-rich-plum text-sm font-black uppercase mb-1">1. Daily Energy (TDEE)</h3>
                            <p className="text-3xl font-black mb-1">{report.tdee} Kcal</p>
                            <p className="text-sm text-clay font-bold leading-tight">The total energy your body needs to power through your day and reach your goal.</p>
                        </div>
                        
                        {/* 2. BODY FAT */}
                        <div className="premium-card p-6 rounded-3xl">
                            <h3 className="text-rich-plum text-sm font-black uppercase mb-1">2. Body Fat Ratio</h3>
                            <p className="text-3xl font-black mb-1">{report.fat}%</p>
                            <p className="text-sm text-clay font-bold leading-tight">Unlike weight, this tells us how much of your body is fat vs. muscle. A key marker of health.</p>
                        </div>

                        {/* 3. BMR */}
                        <div className="premium-card p-6 rounded-3xl">
                            <h3 className="text-rich-plum text-sm font-black uppercase mb-1">3. Resting Burn (BMR)</h3>
                            <p className="text-3xl font-black mb-1">{report.bmr} Kcal</p>
                            <p className="text-sm text-clay font-bold leading-tight">The fuel your heart and brain need just to function while you are at rest.</p>
                        </div>

                        {/* 4. BMI */}
                        <div className="premium-card p-6 rounded-3xl">
                            <h3 className="text-rich-plum text-sm font-black uppercase mb-1">4. Growth Index (BMI)</h3>
                            <p className="text-3xl font-black mb-1">{report.bmi}</p>
                            <p className="text-sm text-clay font-bold leading-tight">Your height-to-weight balance. It confirms if you are carrying a healthy load for your frame.</p>
                        </div>
                    </div>

                    <div className="bg-rich-plum text-white p-8 rounded-[2.5rem] shadow-2xl">
                        <h3 className="text-2xl font-black mb-4 italic uppercase tracking-tighter">Premium Awakening</h3>
                        <div className="space-y-4 mb-8 text-sm opacity-80 font-bold">
                            <p>🔒 Your Personalized Hormone Reset</p>
                            <p>🔒 Hidden Metabolic Blockage Report</p>
                            <p>🔒 Your Exact Metabolic Set-Point</p>
                        </div>
                        <button onClick={() => window.open(`https://wa.me/91XXXXXXXXXX?text=I want my full guide. Score: ${Math.round(report.score)}`)} 
                            className="w-full bg-white text-rich-plum py-6 rounded-2xl font-black uppercase tracking-widest text-lg shadow-xl">
                            Unlock Full Plan - ₹199
                        </button>
                    </div>
                </div>
            );

            const cur = steps[step];

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col fade-up">
                    <Logo />
                    <div className="flex-1 flex flex-col justify-center">
                        <div className="mb-8">
                            <div className="text-5xl mb-4">{cur.icon}</div>
                            <h2 className="text-3xl font-black tracking-tight text-rich-plum uppercase italic leading-tight">{cur.q}</h2>
                            <p className="text-clay text-sm font-extrabold uppercase tracking-wide">{cur.sub}</p>
                        </div>

                        <div className="premium-card p-8 rounded-[2.5rem] relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gray-100">
                                <div className="h-full bg-rich-plum transition-all duration-700" style={{ width: `${((step+1)/steps.length)*100}%` }}></div>
                            </div>
                            
                            {cur.options ? (
                                <div className="grid gap-4 mt-4">
                                    {cur.options.map(o => (
                                        <button key={o[0]} onClick={() => { setForm({...form, [cur.id]: o[0]}); next(); }}
                                            className="w-full p-6 text-left rounded-2xl bg-cream-bg border-2 border-transparent hover:border-rich-plum transition-all font-black text-xl">
                                            {o[1]}
                                        </button>
                                    ))}
                                </div>
                            ) : (
                                <div className="mt-4 text-center">
                                    <input autoFocus type={cur.type} placeholder={cur.placeholder} value={form[cur.id]} onChange={e => setForm({...form, [cur.id]: e.target.value})}
                                        className="w-full bg-transparent border-b-4 border-gray-100 focus:border-rich-plum p-4 text-6xl font-black outline-none transition-all placeholder:text-gray-100 mb-10 text-center text-rich-plum" />
                                    <button onClick={next} className="w-full bg-rich-plum text-white py-6 rounded-2xl font-black uppercase tracking-[0.2em] shadow-xl">
                                        Next →
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
